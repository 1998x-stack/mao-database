<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>毛泽东年谱 — 知识图谱</title>
<link rel="stylesheet" href="base-dark.css">
<style>
:root {
  --person:#C41E3A; --event:#D4A017; --organization:#2E5090;
  --location:#2E8B57; --document:#6B3FA0; --date:#708090;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; overflow:hidden; height:100vh; background:#0d1114; }
.page { display:flex; height:100vh; }
.sidebar { width:280px; min-width:240px; background:#15181e; border-right:1px solid #222; display:flex; flex-direction:column; padding:20px 16px; gap:14px; overflow-y:auto; z-index:10; }
.sidebar h2 { font-size:16px; color:#e0e0e0; display:flex; align-items:center; gap:8px; }
.sidebar h2 .dot { width:8px; height:8px; border-radius:50%; background:var(--person); }
.filter-group { display:flex; flex-direction:column; gap:4px; }
.filter-group label { font-size:10px; color:#777; text-transform:uppercase; letter-spacing:.5px; }
.filter-row { display:flex; gap:8px; align-items:center; }
.filter-row input[type=range] { flex:1; accent-color:var(--person); }
.filter-row span { font-size:12px; color:#ccc; min-width:44px; text-align:right; }
.legend { display:flex; flex-wrap:wrap; gap:4px; }
.legend-item { display:flex; align-items:center; gap:4px; font-size:11px; color:#888; }
.legend-dot { width:8px; height:8px; border-radius:50%; }
.stats { font-size:11px; color:#666; border-top:1px solid #222; padding-top:10px; margin-top:auto; }
.stats strong { color:#ccc; }
#graph { flex:1; position:relative; cursor:grab; }
#graph:active { cursor:grabbing; }
#graph svg { width:100%; height:100%; }
.tooltip {
  position:fixed; background:#1c1f26; border:1px solid #333;
  padding:8px 12px; border-radius:6px; font-size:12px; color:#e0e0e0;
  pointer-events:none; z-index:100; max-width:240px; display:none;
  box-shadow:0 4px 16px rgba(0,0,0,.5);
}
.tooltip .tt-name { font-weight:600; font-size:14px; margin-bottom:2px; }
.tooltip .tt-type { color:#888; font-size:11px; }
.tooltip .tt-meta { color:#666; font-size:10px; margin-top:3px; }
@media (max-width:768px) { .page { flex-direction:column; } .sidebar { width:100%; min-width:auto; max-height:35vh; } }
</style>
</head>
<body>
<div class="page">
<div class="sidebar">
  <h2><span class="dot"></span>毛泽东年谱知识图谱</h2>
  <div class="filter-group">
    <label>年份范围</label>
    <div class="filter-row"><span id="fl">1893</span><input type="range" id="yf" min="1893" max="1976" value="1893"></div>
    <div class="filter-row"><span id="tl">1976</span><input type="range" id="yt" min="1893" max="1976" value="1976"></div>
  </div>
  <div class="filter-group">
    <label>实体类型</label>
    <div class="legend" id="tf"></div>
  </div>
  <div class="filter-group">
    <label>关系类型</label>
    <div class="legend" id="ef"></div>
  </div>
  <div class="stats" id="st"></div>
</div>
<div id="graph"></div>
</div>
<div class="tooltip" id="tt"></div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
const TC={person:'#C41E3A',event:'#D4A017',organization:'#2E5090',location:'#2E8B57',document:'#6B3FA0',date:'#708090'};
const TL={person:'人物',event:'事件',organization:'组织',location:'地点',document:'文献',date:'时间'};
const EL={attended:'出席',presided:'主持',sent_to:'致电',wrote:'撰写',met_with:'会见',discussed_with:'讨论',ordered:'指示',approved:'批准',located_in:'位于',travels_to:'前往',mentioned_in:'提及',part_of:'隶属',member_of:'成员'};

let AN=[],AE=[],FN=[],FE=[];
let svg,g,zoom,filterTimer;

async function load(){
  const[nr,er]=await Promise.all([fetch('data/cleaned_graph/nodes.jsonl'),fetch('data/cleaned_graph/edges.jsonl')]);
  const nLines=(await nr.text()).trim().split('\n');
  const eLines=(await er.text()).trim().split('\n');
  AN.length=0; AE.length=0;
  for(let i=0;i<nLines.length;i++){if(nLines[i])AN.push(JSON.parse(nLines[i]));}
  for(let i=0;i<eLines.length;i++){if(eLines[i])AE.push(JSON.parse(eLines[i]));}
  AN.forEach(n=>{n._y=n.year||parseInt((n.date||'').match(/(\d{4})/)?.[1])||0;});
  buildFilters(); applyFilters();
}

function applyFilters(){
  const fy=+yf.value,ty=+yt.value;
  const at=new Set([...tf.querySelectorAll('input:checked')].map(c=>c.value));
  const ae=new Set([...ef.querySelectorAll('input:checked')].map(c=>c.value));
  const yn=AN.filter(n=>!n._y||(n._y>=fy&&n._y<=ty));
  const tn=at.size?yn.filter(n=>at.has(n.type)):yn;
  const nids=new Set(tn.map(n=>n.id));
  FE=AE.filter(e=>nids.has(e.source)&&nids.has(e.target)&&(!ae.size||ae.has(e.type)));
  const eids=new Set();FE.forEach(e=>{eids.add(e.source);eids.add(e.target);});
  FN=tn.filter(n=>eids.has(n.id));
  st.innerHTML=`节点 <strong>${FN.length}</strong> · 关系 <strong>${FE.length}</strong> · 全部 ${AN.length}/${AE.length}`;
  render();
}

function render(){
  const c=document.getElementById('graph');
  c.innerHTML='';
  const W=c.clientWidth,H=c.clientHeight;
  if(!W||!H)return;

  svg=d3.select('#graph').append('svg').attr('viewBox',[0,0,W,H]);
  g=svg.append('g');

  zoom=d3.zoom().scaleExtent([0.08,8]).on('zoom',e=>g.attr('transform',e.transform));
  svg.call(zoom);
  svg.call(zoom.transform,d3.zoomIdentity.translate(W/2,H/2).scale(0.5));

  const nmap=new Map(); FN.forEach(n=>nmap.set(n.id,n));
  const maxDeg=Math.max(1,...FN.map(n=>n.degree||0));

  g.append('g').selectAll('line').data(FE).join('line')
    .attr('x1',d=>{const s=nmap.get(d.source);return s?.x||0;})
    .attr('y1',d=>{const s=nmap.get(d.source);return s?.y||0;})
    .attr('x2',d=>{const t=nmap.get(d.target);return t?.x||0;})
    .attr('y2',d=>{const t=nmap.get(d.target);return t?.y||0;})
    .attr('stroke','#4a5568')
    .attr('stroke-width',d=>Math.max(0.3,Math.min(4,(d.weight||1)*0.8)))
    .attr('stroke-opacity',0.35);

  g.append('g').selectAll('circle').data(FN).join('circle')
    .attr('cx',d=>d.x||0).attr('cy',d=>d.y||0)
    .attr('r',d=>2+Math.sqrt((d.degree||0)/maxDeg)*12)
    .attr('fill',d=>TC[d.type]||'#888')
    .attr('stroke','#0d1114').attr('stroke-width',1.5)
    .style('cursor','pointer')
    .on('mouseover',showTT).on('mouseout',hideTT);

  g.append('g').selectAll('text').data(FN.filter(n=>n.type==='person'||n.type==='organization')).join('text')
    .attr('x',d=>d.x||0).attr('y',d=>d.y||0)
    .attr('dy',d=>16+Math.sqrt((d.degree||0)/maxDeg)*12)
    .attr('text-anchor','middle')
    .attr('fill','#ccc').attr('font-size','10px')
    .text(d=>d.name.length>6?d.name.slice(0,6)+'…':d.name);
}

function showTT(_,d){
  const tt=document.getElementById('tt');
  tt.style.display='block';
  const al=d.aliases?.length?`<div class="tt-meta">别称: ${d.aliases.join(', ')}</div>`:'';
  tt.innerHTML=`<div class="tt-name">${d.name}</div><div class="tt-type">${TL[d.type]||d.type}</div><div class="tt-meta">连接: ${d.degree||0}${d.date?' · '+d.date:''}</div>${al}`;
}
function hideTT(){document.getElementById('tt').style.display='none';}

function scheduleFilter(){clearTimeout(filterTimer);filterTimer=setTimeout(applyFilters,100);}

function buildFilters(){
  document.addEventListener('mousemove',e=>{const tt=document.getElementById('tt');if(tt.style.display==='block'){tt.style.left=(e.clientX+14)+'px';tt.style.top=(e.clientY-10)+'px';}});
  const tc=document.getElementById('tf');
  [...new Set(AN.map(n=>n.type))].filter(Boolean).forEach(t=>{
    const l=document.createElement('label');l.className='legend-item';
    l.innerHTML=`<input type="checkbox" value="${t}" checked><span class="legend-dot" style="background:${TC[t]||'#888'}"></span>${TL[t]||t}`;
    l.querySelector('input').addEventListener('change',applyFilters);tc.appendChild(l);
  });
  const ec=document.getElementById('ef');
  [...new Set(AE.map(e=>e.type))].filter(Boolean).forEach(t=>{
    const l=document.createElement('label');l.className='legend-item';
    l.innerHTML=`<input type="checkbox" value="${t}" checked>${EL[t]||t}`;
    l.querySelector('input').addEventListener('change',applyFilters);ec.appendChild(l);
  });
  yf.addEventListener('input',()=>{fl.textContent=yf.value;scheduleFilter();});
  yt.addEventListener('input',()=>{tl.textContent=yt.value;scheduleFilter();});
}

window.addEventListener('resize',render);
load();
</script>
</body>
</html>
